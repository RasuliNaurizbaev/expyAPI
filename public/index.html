<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CALC — Express + Python</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0a;
      --surface:   #111111;
      --border:    #2a2a2a;
      --accent:    #e8ff00;
      --accent2:   #ff4d00;
      --text:      #f0f0f0;
      --muted:     #555;
      --mono:      'Share Tech Mono', monospace;
      --sans:      'Barlow Condensed', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    /* Grid overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
    }

    /* Header */
    header {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 2px;
      border-bottom: 2px solid var(--accent);
      padding-bottom: 0.5rem;
    }
    header h1 {
      font-family: var(--sans);
      font-size: 3.5rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--accent);
    }
    header span {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.15em;
    }

    /* Stack label */
    .stack-tag {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
    }
    .stack-tag em { color: var(--accent2); font-style: normal; }

    /* Calculator card */
    .calc-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2rem;
    }

    /* Display */
    .display {
      background: #000;
      border: 1px solid var(--border);
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      font-family: var(--mono);
      position: relative;
      overflow: hidden;
    }
    .display::before {
      content: 'OUTPUT';
      position: absolute;
      top: 0.4rem; right: 0.75rem;
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      color: var(--muted);
    }
    .display-expr {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.25rem;
      min-height: 1.2em;
    }
    .display-result {
      font-size: 2.2rem;
      color: var(--accent);
      letter-spacing: -0.02em;
      line-height: 1.1;
      min-height: 1.2em;
      transition: all 0.15s ease;
    }
    .display-result.error { color: var(--accent2); }
    .display-result.flash { transform: scale(1.02); }

    /* Input row */
    .input-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 1rem;
    }
    .op-label {
      font-family: var(--mono);
      font-size: 1.5rem;
      color: var(--accent);
      text-align: center;
      font-weight: bold;
    }

    input[type="number"] {
      background: #000;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 1.1rem;
      padding: 0.65rem 0.75rem;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    input[type="number"]:focus { border-color: var(--accent); }

    /* Operator buttons */
    .ops-label {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      margin-bottom: 0.5rem;
    }
    .ops-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 0.4rem;
      margin-bottom: 1.25rem;
    }
    .op-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 1rem;
      padding: 0.55rem 0;
      cursor: pointer;
      transition: all 0.12s;
      letter-spacing: 0;
    }
    .op-btn:hover { border-color: var(--accent); color: var(--accent); }
    .op-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      font-weight: bold;
    }

    /* Calculate button */
    .calc-btn {
      width: 100%;
      background: var(--accent);
      border: none;
      color: #000;
      font-family: var(--sans);
      font-size: 1.1rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.9rem;
      cursor: pointer;
      transition: all 0.12s;
      position: relative;
      overflow: hidden;
    }
    .calc-btn:hover { background: #fff; }
    .calc-btn:active { transform: scale(0.99); }
    .calc-btn.loading { opacity: 0.7; pointer-events: none; }
    .calc-btn .spinner {
      display: none;
      width: 14px; height: 14px;
      border: 2px solid #000;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.5s linear infinite;
      margin: 0 auto;
    }
    .calc-btn.loading .btn-text { display: none; }
    .calc-btn.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* History */
    .history-wrap {
      margin-top: 1.5rem;
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }
    .history-label {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      margin-bottom: 0.75rem;
    }
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      max-height: 140px;
      overflow-y: auto;
    }
    .history-item {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      padding: 0.25rem 0.5rem;
      border-left: 2px solid transparent;
      cursor: pointer;
      transition: all 0.1s;
    }
    .history-item:hover { border-left-color: var(--accent); color: var(--text); }
    .history-item .res { color: var(--accent); }
    .history-item.err .res { color: var(--accent2); }

    /* API info */
    .api-info {
      margin-top: 1.5rem;
      background: #000;
      border: 1px solid var(--border);
      padding: 1rem 1.25rem;
    }
    .api-info-label {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      margin-bottom: 0.5rem;
    }
    .api-snippet {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: #7ec8e3;
      white-space: pre-wrap;
      line-height: 1.6;
    }
    .api-snippet .key { color: #c792ea; }
    .api-snippet .val { color: var(--accent); }
  </style>
</head>
<body>
<div class="wrapper">

  <header>
    <h1>CALC</h1>
    <span>v1.0.0 — REST CALCULATOR</span>
  </header>
  <div class="stack-tag">
    <em>Express.js</em> UI + API &nbsp;/&nbsp; <em>Python</em> logic engine
  </div>

  <div class="calc-card">

    <!-- Display -->
    <div class="display">
      <div class="display-expr" id="expr">—</div>
      <div class="display-result" id="result">0</div>
    </div>

    <!-- Number inputs -->
    <div class="input-row">
      <input type="number" id="numA" placeholder="A" value="0" step="any" />
      <div class="op-label" id="opLabel">+</div>
      <input type="number" id="numB" placeholder="B" value="0" step="any" />
    </div>

    <!-- Operators -->
    <div class="ops-label">SELECT OPERATOR</div>
    <div class="ops-grid">
      <button class="op-btn active" data-op="+">+</button>
      <button class="op-btn" data-op="-">−</button>
      <button class="op-btn" data-op="*">×</button>
      <button class="op-btn" data-op="/">&divide;</button>
      <button class="op-btn" data-op="%">%</button>
      <button class="op-btn" data-op="**">xⁿ</button>
    </div>

    <!-- Submit -->
    <button class="calc-btn" id="calcBtn">
      <span class="btn-text">CALCULATE</span>
      <span class="spinner"></span>
    </button>

    <!-- History -->
    <div class="history-wrap">
      <div class="history-label">HISTORY</div>
      <div class="history-list" id="historyList">
        <div class="history-item" style="color:#333">No calculations yet.</div>
      </div>
    </div>
  </div>

  <!-- API info -->
  <div class="api-info">
    <div class="api-info-label">REST ENDPOINT</div>
    <div class="api-snippet" id="apiSnippet"><span class="key">POST</span> /api/calculate
<span class="key">body</span> { <span class="val">"a"</span>: 0, <span class="val">"b"</span>: 0, <span class="val">"operator"</span>: "+" }</div>
  </div>

</div>

<script>
  const ops = document.querySelectorAll('.op-btn');
  const opLabel = document.getElementById('opLabel');
  const numA = document.getElementById('numA');
  const numB = document.getElementById('numB');
  const calcBtn = document.getElementById('calcBtn');
  const exprEl = document.getElementById('expr');
  const resultEl = document.getElementById('result');
  const historyList = document.getElementById('historyList');
  const apiSnippet = document.getElementById('apiSnippet');

  let selectedOp = '+';
  let history = [];

  const opSymbols = { '+': '+', '-': '−', '*': '×', '/': '÷', '%': '%', '**': '^' };

  // Operator selection
  ops.forEach(btn => {
    btn.addEventListener('click', () => {
      ops.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedOp = btn.dataset.op;
      opLabel.textContent = opSymbols[selectedOp] || selectedOp;
      updateSnippet();
    });
  });

  // Live snippet update
  function updateSnippet() {
    const a = numA.value || 0;
    const b = numB.value || 0;
    apiSnippet.innerHTML = `<span class="key">POST</span> /api/calculate\n<span class="key">body</span> { <span class="val">"a"</span>: ${a}, <span class="val">"b"</span>: ${b}, <span class="val">"operator"</span>: "${selectedOp}" }`;
  }
  numA.addEventListener('input', updateSnippet);
  numB.addEventListener('input', updateSnippet);

  // Flash animation
  function flash(el) {
    el.classList.remove('flash');
    void el.offsetWidth;
    el.classList.add('flash');
    setTimeout(() => el.classList.remove('flash'), 200);
  }

  // Calculate
  calcBtn.addEventListener('click', async () => {
    const a = parseFloat(numA.value);
    const b = parseFloat(numB.value);

    if (isNaN(a) || isNaN(b)) {
      resultEl.textContent = 'INVALID INPUT';
      resultEl.classList.add('error');
      return;
    }

    calcBtn.classList.add('loading');

    try {
      const res = await fetch('/api/calculate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ a, b, operator: selectedOp }),
      });

      const data = await res.json();

      if (data.error) {
        exprEl.textContent = `${a} ${opSymbols[selectedOp]} ${b}`;
        resultEl.textContent = data.error.toUpperCase();
        resultEl.classList.add('error');
        addHistory(a, b, selectedOp, null, data.error);
      } else {
        const sym = opSymbols[selectedOp];
        exprEl.textContent = `${a} ${sym} ${b} =`;
        resultEl.textContent = data.result;
        resultEl.classList.remove('error');
        flash(resultEl);
        addHistory(a, b, selectedOp, data.result, null);
      }

    } catch (err) {
      resultEl.textContent = 'NETWORK ERROR';
      resultEl.classList.add('error');
    } finally {
      calcBtn.classList.remove('loading');
    }
  });

  // Enter key
  [numA, numB].forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') calcBtn.click(); });
  });

  // History
  function addHistory(a, b, op, result, error) {
    const sym = opSymbols[op];
    const entry = { a, b, op, sym, result, error };
    history.unshift(entry);
    if (history.length > 10) history.pop();
    renderHistory();
  }

  function renderHistory() {
    if (!history.length) return;
    historyList.innerHTML = history.map((h, i) => `
      <div class="history-item ${h.error ? 'err' : ''}" data-index="${i}">
        <span>${h.a} ${h.sym} ${h.b}</span>
        <span class="res">${h.error ? 'ERR' : h.result}</span>
      </div>
    `).join('');

    historyList.querySelectorAll('.history-item').forEach(el => {
      el.addEventListener('click', () => {
        const h = history[parseInt(el.dataset.index)];
        numA.value = h.a;
        numB.value = h.b;
        ops.forEach(b => {
          b.classList.toggle('active', b.dataset.op === h.op);
        });
        selectedOp = h.op;
        opLabel.textContent = h.sym;
        updateSnippet();
      });
    });
  }
</script>
</body>
</html>
